<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🎓 Contagem de Aulas 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:
        radial-gradient(
            circle at top,
            #312e81,
            #0f172a 70%
        );

    min-height:100vh;

    padding:20px;

    color:white;

    overflow-x:hidden;

}

/* confetes */

.confete{

    position:fixed;

    top:-10px;

    width:12px;

    height:12px;

    border-radius:2px;

    opacity:0.7;

    animation:cair linear infinite;

}

@keyframes cair{

    from{

        transform:
            translateY(-100px)
            rotate(0deg);

    }

    to{

        transform:
            translateY(120vh)
            rotate(720deg);

    }

}

/* container */

.container{

    max-width:950px;

    margin:auto;

}

/* topo */

.topo{

    text-align:center;

    margin-bottom:30px;

}

.topo h1{

    font-size:42px;

    margin-bottom:10px;

}

.topo p{

    color:#cbd5e1;

}

/* cards principais */

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

    margin-bottom:30px;

}

.box{

    background:
        rgba(15,23,42,0.85);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:30px;

    text-align:center;

    backdrop-filter:blur(10px);

    box-shadow:
        0 10px 40px rgba(0,0,0,0.35);

}

.box h2{

    color:#cbd5e1;

    margin-bottom:10px;

}

.numero{

    font-size:64px;

    font-weight:bold;

    color:#c084fc;

}

/* calendário */

.lista{

    background:
        rgba(15,23,42,0.85);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:25px;

    backdrop-filter:blur(10px);

}

.lista h3{

    margin-bottom:20px;

}

/* grid datas */

.calendario{

    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(130px,1fr));

    gap:15px;

}

/* card data */

.dia{

    background:
        rgba(255,255,255,0.05);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:20px;

    padding:18px;

    text-align:center;

    transition:0.25s;

}

.dia:hover{

    transform:
        translateY(-4px)
        scale(1.02);

}

/* aula futura */

.faltando{

    border:
        2px solid #a855f7;

    box-shadow:
        0 0 20px
        rgba(168,85,247,0.25);

}

/* aula passada */

.passou{

    opacity:0.30;

    text-decoration:line-through;

}

/* eventos especiais */

.eventoEspecial{

    border:
        2px solid #f59e0b;

    background:
        linear-gradient(
            135deg,
            rgba(245,158,11,0.18),
            rgba(168,85,247,0.18)
        );

    box-shadow:
        0 0 25px
        rgba(245,158,11,0.25);

}

.diaNumero{

    font-size:34px;

    font-weight:bold;

    color:#c084fc;

    margin-bottom:8px;

}

.diaMes{

    font-size:14px;

    color:#cbd5e1;

    text-transform:capitalize;

}

.diaSemana{

    margin-top:10px;

    font-size:12px;

    color:#94a3b8;

    background:
        rgba(255,255,255,0.06);

    padding:5px;

    border-radius:10px;

    text-transform:capitalize;

}

.eventoTitulo{

    margin-top:12px;

    font-size:12px;

    color:#fde68a;

    line-height:1.4;

}

.footer{

    text-align:center;

    margin-top:25px;

    color:#94a3b8;

}

/* celular */

@media(max-width:600px){

    .grid{

        grid-template-columns:1fr;

    }

    .topo h1{

        font-size:30px;

    }

    .numero{

        font-size:48px;

    }

    .calendario{

        grid-template-columns:
            repeat(2,1fr);

        gap:10px;

    }

    .dia{

        padding:12px;

    }

    .diaNumero{

        font-size:24px;

    }

    .diaMes{

        font-size:11px;

    }

    .diaSemana{

        font-size:10px;

    }

    .eventoTitulo{

        font-size:10px;

    }

}

</style>
</head>

<body>

<!-- confetes -->

<div class="confete"
style="left:5%;background:#f43f5e;animation-duration:8s;"></div>

<div class="confete"
style="left:15%;background:#22c55e;animation-duration:11s;"></div>

<div class="confete"
style="left:30%;background:#3b82f6;animation-duration:9s;"></div>

<div class="confete"
style="left:45%;background:#eab308;animation-duration:12s;"></div>

<div class="confete"
style="left:60%;background:#ec4899;animation-duration:10s;"></div>

<div class="confete"
style="left:75%;background:#06b6d4;animation-duration:13s;"></div>

<div class="confete"
style="left:90%;background:#f97316;animation-duration:8s;"></div>

<div class="container">

    <div class="topo">

        <h1>
            🎓 Contagem de Aulas 2026
        </h1>

        <p>
            Última reta da turma 🚀
        </p>

    </div>

    <div class="grid">

        <div class="box">

            <h2>
                Aulas restantes
            </h2>

            <div
            class="numero"
            id="aulasRestantes">

                0

            </div>

        </div>

        <div class="box">

            <h2>
                Dias até acabar
            </h2>

            <div
            class="numero"
            id="diasRestantes">

                0

            </div>

        </div>

    </div>

    <div class="lista">

        <h3>
            📅 Calendário
        </h3>

        <div
        class="calendario"
        id="listaAulas"></div>

    </div>

    <div class="footer">

        Atualiza automaticamente
        conforme a data atual

    </div>

</div>

<script>

const aulas = [

    '2026-06-18',
    '2026-06-22',
    '2026-06-23',
    '2026-06-25',
    '2026-06-29',
    '2026-06-30',
    '2026-07-01',
    '2026-07-02',
    '2026-07-03',
    '2026-07-06'

];

const eventos = [

    {
        data:'2026-07-19',
        titulo:'🍖 Churrasco da turma'
    },

    {
        data:'2026-10-07',
        titulo:'🎓 Formatura (Kinderovo)'
    }

];

function nomeDia(data){

    return data
        .toLocaleDateString(
            'pt-BR',
            { weekday:'long' }
        )
        .replace('-feira','');

}

const hoje = new Date();

hoje.setHours(0,0,0,0);

const lista =
    document.getElementById(
        'listaAulas'
    );

let aulasRestantes = 0;

/* aulas */

aulas.forEach(dataStr => {

    const data =
        new Date(
            dataStr + 'T00:00:00'
        );

    const card =
        document.createElement('div');

    card.classList.add('dia');

    const dia =
        data.getDate();

    const mes =
        data.toLocaleDateString(
            'pt-BR',
            { month:'short' }
        );

    const semana =
        nomeDia(data);

    card.innerHTML = `

        <div class="diaNumero">
            ${dia}
        </div>

        <div class="diaMes">
            ${mes}
        </div>

        <div class="diaSemana">
            ${semana}
        </div>

    `;

    if(data >= hoje){

        aulasRestantes++;

        card.classList.add(
            'faltando'
        );

    }else{

        card.classList.add(
            'passou'
        );

    }

    lista.appendChild(card);

});

/* eventos especiais */

eventos.forEach(evento => {

    const data =
        new Date(
            evento.data + 'T00:00:00'
        );

    const card =
        document.createElement('div');

    card.classList.add(
        'dia',
        'eventoEspecial'
    );

    const dia =
        data.getDate();

    const mes =
        data.toLocaleDateString(
            'pt-BR',
            { month:'short' }
        );

    const semana =
        nomeDia(data);

    card.innerHTML = `

        <div class="diaNumero">
            ${dia}
        </div>

        <div class="diaMes">
            ${mes}
        </div>

        <div class="diaSemana">
            ${semana}
        </div>

        <div class="eventoTitulo">
            ${evento.titulo}
        </div>

    `;

    lista.appendChild(card);

});

/* total aulas */

document.getElementById(
    'aulasRestantes'
).innerText = aulasRestantes;

/* dias até acabar */

const ultimaAula =
    new Date(
        '2026-07-06T00:00:00'
    );

const diferenca =
    ultimaAula.getTime()
    - hoje.getTime();

let diasRestantes =
    Math.floor(
        diferenca /
        (1000 * 60 * 60 * 24)
    ) + 1;

if(diasRestantes < 0){
    diasRestantes = 0;
}

document.getElementById(
    'diasRestantes'
).innerText = diasRestantes;
</script>
</body>
</html>
